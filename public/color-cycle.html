<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Cycle</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0A211F;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 60px 40px;
  }

  h1 {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: clamp(3.5rem, 9vw, 10rem);
    line-height: 1.06;
    letter-spacing: -0.025em;
    font-weight: 400;
  }

  .line {
    display: block;
    transition: color 0.9s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /*
    3 colors × 3 lines cycling:
    each line holds a color for 2.5s then transitions
    cycle total = 7.5s per line
    lines offset by 2.5s each
  */

  @keyframes cycle {
    0%,   28%  { color: #DADECF; }   /* cream */
    33%,  61%  { color: #BDD8D9; }   /* teal  */
    66%,  94%  { color: #0A211F; }   /* base (invisible = elegant vanish) */
    99%,  100% { color: #DADECF; }
  }

  .line-1 {
    animation: cycle 7.5s ease-in-out infinite;
    animation-delay: 0s;
  }
  .line-2 {
    animation: cycle 7.5s ease-in-out infinite;
    animation-delay: -2.5s;
  }
  .line-3 {
    animation: cycle 7.5s ease-in-out infinite;
    animation-delay: -5s;
  }
</style>
</head>
<body>
  <h1>
    <span class="line line-1">The Turning</span>
    <span class="line line-2"><em>Point For Your</em></span>
    <span class="line line-3">Creative Ambition.</span>
  </h1>
</body>
</html>
